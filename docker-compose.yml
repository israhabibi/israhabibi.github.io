services:
  mkdocs:
    image: python:3.12-slim
    working_dir: /docs
    ports:
      - "8003:8000"
    volumes:
      - .:/docs
    environment:
      - NO_MKDOCS_2_WARNING=1
      - PYTHONUNBUFFERED=1
    command: >
      sh -lc
      "pip install --no-cache-dir -q mkdocs-material
      && mkdocs serve -a 0.0.0.0:8000"

  build:
    image: python:3.12-slim
    working_dir: /docs
    volumes:
      - .:/docs
    environment:
      - NO_MKDOCS_2_WARNING=1
      - PYTHONUNBUFFERED=1
    command: >
      sh -lc
      "pip install --no-cache-dir -q mkdocs-material
      && mkdocs build --clean"

  site:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./site:/usr/share/nginx/html:ro
    profiles:
      - prod
